<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Penalty Kick - WebXR Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: #0a0a0a;
    color: #fff;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #loading-screen {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }

  #loading-screen.hidden {
    opacity: 0;
    visibility: hidden;
  }

  #loading-screen h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #00e5a0, #00b8d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  #loading-screen p {
    font-size: 14px;
    color: #666;
    font-weight: 300;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #222;
    border-top-color: #00e5a0;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 24px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 20px 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 10;
    pointer-events: none;
  }

  .hud-left, .hud-right { pointer-events: auto; }

  .hud-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #555;
    margin-bottom: 4px;
  }

  .hud-value {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    color: #fff;
  }

  .hud-round {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }

  .round-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s ease;
  }

  .round-dot.active { background: #00e5a0; }
  .round-dot.scored { background: #f5c842; }
  .round-dot.missed { background: #e24b4a; }

  #bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 20px 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    z-index: 10;
  }

  .btn {
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 12px 32px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: linear-gradient(135deg, #00e5a0, #00b8d4);
    color: #0a0a0a;
  }

  .btn-primary:hover { transform: scale(1.04); filter: brightness(1.1); }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: #aaa;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn-secondary:hover { background: rgba(255,255,255,0.14); color: #fff; }

  #message-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  #message-overlay.show { opacity: 1; }

  #message-text {
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 900;
    letter-spacing: -2px;
    text-shadow: 0 0 60px rgba(0,229,160,0.4);
  }

  .goal-text { color: #f5c842; }
  .miss-text { color: #e24b4a; }
  .ready-text { color: #00e5a0; }

  #speed-display {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  #speed-display.show { opacity: 1; }

  #speed-display .speed-val {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: -2px;
    color: #00e5a0;
  }

  #speed-display .speed-unit {
    font-size: 14px;
    font-weight: 300;
    color: #666;
  }

  #vr-not-supported {
    display: none;
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: #666;
    z-index: 10;
  }

  canvas { display: block; }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <h1>VR Penalty Kick</h1>
  <p>Loading 3D scene...</p>
</div>

<div id="hud">
  <div class="hud-left">
    <div class="hud-label">Score</div>
    <div class="hud-value" id="score-display">0</div>
  </div>
  <div class="hud-right">
    <div class="hud-label">Round</div>
    <div class="hud-round" id="round-dots">
      <div class="round-dot active"></div>
      <div class="round-dot"></div>
      <div class="round-dot"></div>
    </div>
  </div>
</div>

<div id="message-overlay">
  <div id="message-text"></div>
</div>

<div id="speed-display">
  <div class="speed-val" id="kick-speed">0</div>
  <div class="speed-unit">km/h</div>
</div>

<div id="bottom-bar">
  <button class="btn btn-primary" id="btn-kick">Kick Ball</button>
  <button class="btn btn-secondary" id="btn-reset">Reset</button>
  <button class="btn btn-secondary" id="btn-vr" style="display:none">Enter VR</button>
</div>

<div id="vr-not-supported"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Game State ───
const state = {
  round: 0,
  maxRounds: 3,
  score: 0,
  ballKicked: false,
  ballReady: true,
  results: [],
  goalieSpeed: [0.6, 0.8, 1.0],
};

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a3a2a);
scene.fog = new THREE.FogExp2(0x1a3a2a, 0.012);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.5, 20);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

// ─── WebXR ───
if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then((supported) => {
    if (supported) {
      const vrBtn = document.getElementById('btn-vr');
      vrBtn.style.display = 'inline-block';

      const vrButtonEl = VRButton.createButton(renderer);
      vrBtn.addEventListener('click', () => vrButtonEl.click());
    } else {
      document.getElementById('vr-not-supported').style.display = 'block';
      document.getElementById('vr-not-supported').textContent = 'WebXR VR not supported on this device — using desktop mode';
    }
  });
}

// ─── Controls (desktop fallback) ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI * 0.55;
controls.minDistance = 8;
controls.maxDistance = 30;

// ─── Lighting ───
const ambientLight = new THREE.HemisphereLight(0x87ceeb, 0x2d5a27, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.8);
sunLight.position.set(30, 40, 20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 100;
sunLight.shadow.camera.left = -30;
sunLight.shadow.camera.right = 30;
sunLight.shadow.camera.top = 30;
sunLight.shadow.camera.bottom = -30;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0xc4e0ff, 0.3);
fillLight.position.set(-20, 10, -10);
scene.add(fillLight);

// ─── Stadium Lights ───
function createStadiumLight(x, z) {
  const poleGeo = new THREE.CylinderGeometry(0.15, 0.2, 18, 8);
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8, roughness: 0.3 });
  const pole = new THREE.Mesh(poleGeo, poleMat);
  pole.position.set(x, 9, z);
  pole.castShadow = true;
  scene.add(pole);

  const spotLight = new THREE.SpotLight(0xfff5e6, 30, 60, Math.PI * 0.3, 0.5, 1);
  spotLight.position.set(x, 18, z);
  spotLight.target.position.set(0, 0, 0);
  spotLight.castShadow = false;
  scene.add(spotLight);
  scene.add(spotLight.target);
}

createStadiumLight(-25, -15);
createStadiumLight(25, -15);
createStadiumLight(-25, 25);
createStadiumLight(25, 25);

// ─── Ground / Pitch ───
const pitchGeo = new THREE.PlaneGeometry(70, 100, 1, 1);
const pitchMat = new THREE.MeshStandardMaterial({ color: 0x2d8a4e, roughness: 0.9, metalness: 0 });
const pitch = new THREE.Mesh(pitchGeo, pitchMat);
pitch.rotation.x = -Math.PI / 2;
pitch.receiveShadow = true;
scene.add(pitch);

// Pitch lines
const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });

function createLine(x, z, w, h) {
  const geo = new THREE.PlaneGeometry(w, h);
  const line = new THREE.Mesh(geo, lineMat);
  line.rotation.x = -Math.PI / 2;
  line.position.set(x, 0.01, z);
  scene.add(line);
  return line;
}

// Penalty box
createLine(0, -8, 32, 0.12);   // top
createLine(0, -20, 32, 0.12);  // bottom
createLine(-16, -14, 0.12, 12);  // left
createLine(16, -14, 0.12, 12);   // right

// Goal area
createLine(0, -15, 14, 0.12);
createLine(0, -20, 14, 0.12);
createLine(-7, -17.5, 0.12, 5);
createLine(7, -17.5, 0.12, 5);

// Penalty spot
const spotGeo = new THREE.CircleGeometry(0.15, 16);
const spotMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const penaltySpot = new THREE.Mesh(spotGeo, spotMat);
penaltySpot.rotation.x = -Math.PI / 2;
penaltySpot.position.set(0, 0.02, -9);
scene.add(penaltySpot);

// Center circle arc (partial)
const arcGeo = new THREE.RingGeometry(6, 6.1, 32, 1, Math.PI * 0.7, Math.PI * 0.6);
const arc = new THREE.Mesh(arcGeo, lineMat);
arc.rotation.x = -Math.PI / 2;
arc.position.set(0, 0.01, -8);
scene.add(arc);

// ─── Goal ───
const goalWidth = 7.32;
const goalHeight = 2.44;
const goalDepth = 2;
const postRadius = 0.06;
const goalZ = -20;

const postMat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.7, roughness: 0.2 });

function createPost(x, y, z, height, horizontal = false) {
  const geo = horizontal
    ? new THREE.CylinderGeometry(postRadius, postRadius, goalWidth, 8)
    : new THREE.CylinderGeometry(postRadius, postRadius, height, 8);
  const post = new THREE.Mesh(geo, postMat);
  if (horizontal) post.rotation.z = Math.PI / 2;
  post.position.set(x, y, z);
  post.castShadow = true;
  scene.add(post);
  return post;
}

// Posts
createPost(-goalWidth / 2, goalHeight / 2, goalZ, goalHeight);
createPost(goalWidth / 2, goalHeight / 2, goalZ, goalHeight);
createPost(0, goalHeight, goalZ, 0, true);

// Crossbar depth supports
createPost(-goalWidth / 2, goalHeight, goalZ - goalDepth / 2, 0, false);
const supportGeo = new THREE.CylinderGeometry(postRadius * 0.7, postRadius * 0.7, goalDepth, 6);
const supportL = new THREE.Mesh(supportGeo, postMat);
supportL.rotation.x = Math.PI / 2;
supportL.position.set(-goalWidth / 2, goalHeight, goalZ - goalDepth / 2);
scene.add(supportL);
const supportR = supportL.clone();
supportR.position.x = goalWidth / 2;
scene.add(supportR);

// Net (simple mesh)
const netMat = new THREE.MeshBasicMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.15,
  wireframe: true,
  side: THREE.DoubleSide
});

// Back net
const netBackGeo = new THREE.PlaneGeometry(goalWidth, goalHeight, 12, 4);
const netBack = new THREE.Mesh(netBackGeo, netMat);
netBack.position.set(0, goalHeight / 2, goalZ - goalDepth);
scene.add(netBack);

// Top net
const netTopGeo = new THREE.PlaneGeometry(goalWidth, goalDepth, 12, 3);
const netTop = new THREE.Mesh(netTopGeo, netMat);
netTop.rotation.x = Math.PI / 2;
netTop.position.set(0, goalHeight, goalZ - goalDepth / 2);
scene.add(netTop);

// Side nets
const netSideGeo = new THREE.PlaneGeometry(goalDepth, goalHeight, 3, 4);
const netLeft = new THREE.Mesh(netSideGeo, netMat);
netLeft.rotation.y = Math.PI / 2;
netLeft.position.set(-goalWidth / 2, goalHeight / 2, goalZ - goalDepth / 2);
scene.add(netLeft);
const netRight = netLeft.clone();
netRight.position.x = goalWidth / 2;
scene.add(netRight);

// ─── Football ───
const ballGeo = new THREE.IcosahedronGeometry(0.22, 2);
const ballMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  roughness: 0.4,
  metalness: 0.1,
});
const ball = new THREE.Mesh(ballGeo, ballMat);
ball.position.set(0, 0.22, -9);
ball.castShadow = true;
scene.add(ball);

// Ball pentagon pattern (visual detail)
const pentGeo = new THREE.IcosahedronGeometry(0.225, 2);
const pentMat = new THREE.MeshStandardMaterial({
  color: 0x111111,
  roughness: 0.5,
  metalness: 0,
  wireframe: true,
  transparent: true,
  opacity: 0.3,
});
const ballPattern = new THREE.Mesh(pentGeo, pentMat);
ball.add(ballPattern);

// ─── Goalkeeper (simplified) ───
const goalie = new THREE.Group();
goalie.position.set(0, 0, goalZ + 0.5);

// Body
const bodyGeo = new THREE.CapsuleGeometry(0.25, 0.8, 4, 8);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00e5a0, roughness: 0.6 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = 1.0;
goalie.add(body);

// Head
const headGeo = new THREE.SphereGeometry(0.18, 12, 12);
const headMat = new THREE.MeshStandardMaterial({ color: 0xf5c5a3, roughness: 0.7 });
const head = new THREE.Mesh(headGeo, headMat);
head.position.y = 1.65;
goalie.add(head);

// Arms
const armGeo = new THREE.CapsuleGeometry(0.08, 0.5, 4, 6);
const armMat = new THREE.MeshStandardMaterial({ color: 0x00e5a0, roughness: 0.6 });

const leftArm = new THREE.Mesh(armGeo, armMat);
leftArm.position.set(-0.4, 1.2, 0);
leftArm.rotation.z = Math.PI * 0.15;
goalie.add(leftArm);

const rightArm = new THREE.Mesh(armGeo, armMat);
rightArm.position.set(0.4, 1.2, 0);
rightArm.rotation.z = -Math.PI * 0.15;
goalie.add(rightArm);

// Legs
const legGeo = new THREE.CapsuleGeometry(0.1, 0.5, 4, 6);
const legMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });

const leftLeg = new THREE.Mesh(legGeo, legMat);
leftLeg.position.set(-0.15, 0.35, 0);
goalie.add(leftLeg);

const rightLeg = leftLeg.clone();
rightLeg.position.x = 0.15;
goalie.add(rightLeg);

// Gloves
const gloveMat = new THREE.MeshStandardMaterial({ color: 0xf5c842, roughness: 0.5 });
const gloveGeo = new THREE.SphereGeometry(0.1, 8, 8);

const leftGlove = new THREE.Mesh(gloveGeo, gloveMat);
leftGlove.position.set(-0.45, 1.55, 0);
goalie.add(leftGlove);

const rightGlove = leftGlove.clone();
rightGlove.position.x = 0.45;
goalie.add(rightGlove);

goalie.castShadow = true;
scene.add(goalie);

// ─── Audience stands (simple boxes) ───
function createStand(x, z, w, rotY) {
  const geo = new THREE.BoxGeometry(w, 6, 4);
  const mat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9 });
  const stand = new THREE.Mesh(geo, mat);
  stand.position.set(x, 2, z);
  stand.rotation.y = rotY;
  scene.add(stand);

  // Crowd dots
  for (let i = 0; i < 40; i++) {
    const dotGeo = new THREE.SphereGeometry(0.1, 4, 4);
    const colors = [0xe24b4a, 0xf5c842, 0x00b8d4, 0xff6b35, 0x9b59b6, 0xffffff];
    const dotMat = new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
    const dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.set(
      (Math.random() - 0.5) * (w - 1),
      3 + Math.random() * 2.5,
      (Math.random() - 0.5) * 2
    );
    stand.add(dot);
  }
}

createStand(0, -35, 50, 0);
createStand(-30, -5, 40, Math.PI / 2);
createStand(30, -5, 40, -Math.PI / 2);

// ─── Ball Physics (simplified) ───
let ballVelocity = new THREE.Vector3();
let ballAngularVel = new THREE.Vector3();
const gravity = -9.8;
const ballStartPos = new THREE.Vector3(0, 0.22, -9);
let kickTime = 0;
let goalieTarget = 0;
let goalieDiving = false;
let goalieVel = 0;

function kickBall(targetX, targetY) {
  if (!state.ballReady || state.round >= state.maxRounds) return;

  state.ballKicked = true;
  state.ballReady = false;
  kickTime = performance.now();

  // Calculate direction toward goal
  const dx = targetX - ball.position.x;
  const dy = (targetY || 1.2) - ball.position.y;
  const dz = (goalZ + 0.5) - ball.position.z;
  const dist = Math.sqrt(dx * dx + dz * dz);

  const speed = 18 + Math.random() * 8; // 18-26 m/s
  const t = dist / speed;

  ballVelocity.set(
    dx / t,
    (dy / t) - 0.5 * gravity * t,
    dz / t
  );

  ballAngularVel.set(
    (Math.random() - 0.5) * 10,
    (Math.random() - 0.5) * 5,
    -15
  );

  // Display speed
  const kmh = Math.round(speed * 3.6);
  document.getElementById('kick-speed').textContent = kmh;
  document.getElementById('speed-display').classList.add('show');

  // Goalie AI — decide which way to dive
  const difficulty = state.goalieSpeed[state.round] || 1;
  const reaction = 200 + (1 - difficulty) * 300;

  setTimeout(() => {
    goalieDiving = true;
    // Goalie guesses direction (with some accuracy based on difficulty)
    const guessCorrect = Math.random() < (0.3 + difficulty * 0.3);
    goalieTarget = guessCorrect ? Math.sign(targetX || (Math.random() - 0.5)) : -Math.sign(targetX || (Math.random() - 0.5));
    goalieTarget *= (1.5 + difficulty);
    goalieVel = 0;
  }, reaction);
}

function resetBall() {
  ball.position.copy(ballStartPos);
  ballVelocity.set(0, 0, 0);
  ballAngularVel.set(0, 0, 0);
  ball.rotation.set(0, 0, 0);
  state.ballKicked = false;
  state.ballReady = true;
  goalieDiving = false;
  goalieVel = 0;
  goalie.position.set(0, 0, goalZ + 0.5);
  goalie.rotation.z = 0;
  leftArm.rotation.z = Math.PI * 0.15;
  rightArm.rotation.z = -Math.PI * 0.15;
  leftArm.position.y = 1.2;
  rightArm.position.y = 1.2;
  document.getElementById('speed-display').classList.remove('show');
}

function checkGoal() {
  const bx = ball.position.x;
  const by = ball.position.y;
  const bz = ball.position.z;

  if (bz > goalZ - 0.5 && bz < goalZ + 0.5) {
    // Check if goalie saves
    const goalieX = goalie.position.x;
    const saveReach = 1.2;
    const saved = Math.abs(bx - goalieX) < saveReach && by < goalHeight + 0.3;

    if (Math.abs(bx) < goalWidth / 2 && by > 0 && by < goalHeight && !saved) {
      // GOAL!
      state.score += 1;
      state.results[state.round] = 'goal';
      showMessage('GOAL!', 'goal-text');
      updateHUD();
    } else if (saved) {
      state.results[state.round] = 'miss';
      showMessage('SAVED!', 'miss-text');
      updateHUD();
    } else {
      state.results[state.round] = 'miss';
      showMessage('MISS!', 'miss-text');
      updateHUD();
    }

    state.round++;

    setTimeout(() => {
      hideMessage();
      if (state.round < state.maxRounds) {
        resetBall();
        showMessage('READY', 'ready-text');
        setTimeout(hideMessage, 800);
      } else {
        showFinalResult();
      }
    }, 1500);

    return true;
  }

  // Ball went too far or out of bounds
  if (bz < goalZ - 5 || Math.abs(bx) > 20 || by < -1) {
    state.results[state.round] = 'miss';
    showMessage('MISS!', 'miss-text');
    updateHUD();
    state.round++;

    setTimeout(() => {
      hideMessage();
      if (state.round < state.maxRounds) {
        resetBall();
        showMessage('READY', 'ready-text');
        setTimeout(hideMessage, 800);
      } else {
        showFinalResult();
      }
    }, 1500);

    return true;
  }

  return false;
}

// ─── UI Functions ───
function showMessage(text, className) {
  const overlay = document.getElementById('message-overlay');
  const msgEl = document.getElementById('message-text');
  msgEl.textContent = text;
  msgEl.className = className || '';
  overlay.classList.add('show');
}

function hideMessage() {
  document.getElementById('message-overlay').classList.remove('show');
}

function updateHUD() {
  document.getElementById('score-display').textContent = state.score;
  const dots = document.querySelectorAll('.round-dot');
  state.results.forEach((r, i) => {
    dots[i].classList.remove('active');
    dots[i].classList.add(r === 'goal' ? 'scored' : 'missed');
  });
  if (state.round < state.maxRounds) {
    dots[state.round]?.classList.add('active');
  }
}

function showFinalResult() {
  let medal = '';
  if (state.score === 3) medal = '🥇 GOLD';
  else if (state.score === 2) medal = '🥈 SILVER';
  else if (state.score === 1) medal = '🥉 BRONZE';
  else medal = 'TRY AGAIN';

  showMessage(`${medal}  ${state.score}/3`, 'ready-text');
}

function resetGame() {
  state.round = 0;
  state.score = 0;
  state.results = [];
  resetBall();
  updateHUD();
  hideMessage();

  const dots = document.querySelectorAll('.round-dot');
  dots.forEach((d, i) => {
    d.className = 'round-dot';
    if (i === 0) d.classList.add('active');
  });
}

// ─── Click to aim + kick ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Invisible aim plane at goal
const aimPlaneGeo = new THREE.PlaneGeometry(goalWidth * 1.5, goalHeight * 2);
const aimPlaneMat = new THREE.MeshBasicMaterial({ visible: false });
const aimPlane = new THREE.Mesh(aimPlaneGeo, aimPlaneMat);
aimPlane.position.set(0, goalHeight / 2 + 0.5, goalZ);
scene.add(aimPlane);

// Aim crosshair
const crosshairGeo = new THREE.RingGeometry(0.12, 0.16, 16);
const crosshairMat = new THREE.MeshBasicMaterial({ color: 0x00e5a0, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
const crosshair = new THREE.Mesh(crosshairGeo, crosshairMat);
crosshair.position.set(0, 1.2, goalZ + 0.1);
scene.add(crosshair);

renderer.domElement.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(aimPlane);
  if (hits.length > 0 && state.ballReady) {
    crosshair.position.x = THREE.MathUtils.clamp(hits[0].point.x, -goalWidth / 2, goalWidth / 2);
    crosshair.position.y = THREE.MathUtils.clamp(hits[0].point.y, 0.3, goalHeight);
    crosshair.visible = true;
  }
});

renderer.domElement.addEventListener('click', () => {
  if (state.ballReady && state.round < state.maxRounds) {
    kickBall(crosshair.position.x, crosshair.position.y);
    crosshair.visible = false;
  }
});

// ─── Button Events ───
document.getElementById('btn-kick').addEventListener('click', () => {
  if (state.ballReady && state.round < state.maxRounds) {
    const rx = (Math.random() - 0.5) * goalWidth * 0.8;
    const ry = 0.5 + Math.random() * (goalHeight - 0.5);
    kickBall(rx, ry);
  }
});

document.getElementById('btn-reset').addEventListener('click', resetGame);

// ─── Animation Loop ───
const clock = new THREE.Clock();

function animate() {
  const delta = Math.min(clock.getDelta(), 0.05);

  // Ball physics
  if (state.ballKicked) {
    ballVelocity.y += gravity * delta;
    ball.position.addScaledVector(ballVelocity, delta);
    ball.rotation.x += ballAngularVel.x * delta;
    ball.rotation.y += ballAngularVel.y * delta;
    ball.rotation.z += ballAngularVel.z * delta;

    // Ground bounce
    if (ball.position.y < 0.22) {
      ball.position.y = 0.22;
      ballVelocity.y = Math.abs(ballVelocity.y) * 0.4;
      ballVelocity.x *= 0.8;
      ballVelocity.z *= 0.8;
    }

    checkGoal();
  }

  // Goalie AI animation
  if (goalieDiving) {
    goalieVel += (goalieTarget - goalie.position.x) * 8 * delta;
    goalieVel *= 0.9;
    goalie.position.x += goalieVel * delta * 60;
    goalie.position.x = THREE.MathUtils.clamp(goalie.position.x, -goalWidth / 2 + 0.3, goalWidth / 2 - 0.3);

    // Diving animation
    const diveAmount = Math.abs(goalieVel) * 0.3;
    goalie.rotation.z = -Math.sign(goalieVel) * Math.min(diveAmount, 0.8);
    leftArm.rotation.z = Math.PI * 0.15 + diveAmount * 2;
    rightArm.rotation.z = -Math.PI * 0.15 - diveAmount * 2;
    leftArm.position.y = 1.2 + diveAmount * 0.5;
    rightArm.position.y = 1.2 + diveAmount * 0.5;
  }

  // Goalie idle sway
  if (!goalieDiving && !state.ballKicked) {
    const t = clock.elapsedTime;
    goalie.position.x = Math.sin(t * 1.5) * 0.6;
    leftArm.rotation.z = Math.PI * 0.15 + Math.sin(t * 2) * 0.1;
    rightArm.rotation.z = -Math.PI * 0.15 - Math.sin(t * 2) * 0.1;
  }

  // Crosshair pulse
  if (crosshair.visible) {
    crosshair.scale.setScalar(1 + Math.sin(clock.elapsedTime * 4) * 0.1);
  }

  controls.update();
  renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Hide Loading ───
setTimeout(() => {
  document.getElementById('loading-screen').classList.add('hidden');
  showMessage('READY', 'ready-text');
  setTimeout(hideMessage, 1200);
}, 800);

</script>
