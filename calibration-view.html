<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Penalty Kick — View Calibration</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: #0a0a0a;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    color: #fff;
  }

  .screen {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  /* ─── 背景 ─── */
  .bg-layer { position: absolute; inset: 0; z-index: 0; }
  #bgCanvas { width: 100%; height: 100%; display: block; }
  .bg-darken {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 70% at 50% 45%, rgba(0,0,0,0.25), rgba(0,0,0,0.7));
  }

  /* ─── 頂部步驟標題列 ─── */
  .step-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: linear-gradient(90deg, #005f5f, #008888, #00a5a0, #008888, #005f5f);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 20;
    box-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  .step-header-icon {
    width: 32px; height: 32px;
    background: rgba(0,0,0,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .step-header-icon svg { width: 20px; height: 20px; }

  .step-header-title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    font-style: italic;
  }

  /* ─── 說明文字 ─── */
  .instruction-area {
    position: absolute;
    top: 72px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 15;
  }

  .instruction-main {
    font-size: 22px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 8px;
  }

  .instruction-sub {
    font-size: 14px;
    font-weight: 400;
    color: rgba(0, 229, 160, 0.7);
    font-style: italic;
  }

  /* ─── 校準目標點 ─── */
  .calibration-target {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    z-index: 15;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 外圈旋轉環 */
  .calib-ring-outer {
    position: absolute;
    width: 180px; height: 180px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top: 2px solid #00e5a0;
    border-right: 2px solid rgba(0,229,160,0.4);
    animation: spin 2s linear infinite;
  }

  .calib-ring-mid {
    position: absolute;
    width: 150px; height: 150px;
    border-radius: 50%;
    border: 2px dashed rgba(0,229,160,0.3);
    animation: spin-reverse 3s linear infinite;
  }

  .calib-ring-inner {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 1px solid rgba(0,229,160,0.2);
  }

  /* 十字準星 */
  .calib-crosshair {
    position: absolute;
    width: 200px; height: 200px;
  }

  .calib-crosshair::before,
  .calib-crosshair::after {
    content: '';
    position: absolute;
    background: rgba(0, 229, 160, 0.3);
  }

  .calib-crosshair::before {
    width: 1px; height: 100%;
    left: 50%; top: 0;
  }

  .calib-crosshair::after {
    width: 100%; height: 1px;
    top: 50%; left: 0;
  }

  /* 角落裝飾 */
  .corner-mark {
    position: absolute;
    width: 20px; height: 20px;
    border-color: #00e5a0;
    border-style: solid;
    border-width: 0;
  }

  .corner-tl { top: 10px; left: 10px; border-top-width: 2px; border-left-width: 2px; }
  .corner-tr { top: 10px; right: 10px; border-top-width: 2px; border-right-width: 2px; }
  .corner-bl { bottom: 10px; left: 10px; border-bottom-width: 2px; border-left-width: 2px; }
  .corner-br { bottom: 10px; right: 10px; border-bottom-width: 2px; border-right-width: 2px; }

  /* 中心黃色球（校準中） */
  .calib-dot {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffe066, #f5c842, #d4a017);
    box-shadow: 0 0 30px rgba(245, 200, 66, 0.6), 0 0 60px rgba(245, 200, 66, 0.2);
    z-index: 2;
    transition: all 0.6s ease;
  }

  /* 校準完成：綠色勾勾 */
  .calib-dot.done {
    background: radial-gradient(circle at 35% 35%, #33ff99, #00e5a0, #00b87a);
    box-shadow: 0 0 30px rgba(0, 229, 160, 0.6), 0 0 60px rgba(0, 229, 160, 0.3);
    width: 60px; height: 60px;
  }

  .calib-check {
    display: none;
    position: absolute;
    z-index: 3;
  }

  .calib-check.show { display: block; }

  .calib-check svg {
    width: 36px; height: 36px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }

  /* 閃爍小點 */
  .calib-pulse {
    position: absolute;
    width: 180px; height: 180px;
    border-radius: 50%;
    border: 1px solid rgba(0, 229, 160, 0.4);
    animation: calib-pulse 2s ease-out infinite;
  }

  @keyframes calib-pulse {
    0% { transform: scale(0.6); opacity: 0.8; }
    100% { transform: scale(1.3); opacity: 0; }
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes spin-reverse {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(-360deg); }
  }

  /* ─── 校準狀態文字 ─── */
  .status-text {
    position: absolute;
    bottom: calc(50% - 150px);
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 15;
    font-size: 20px;
    font-weight: 700;
    font-style: italic;
    transition: all 0.4s ease;
  }

  .status-calibrating {
    color: #00e5a0;
    animation: blink 1.5s ease-in-out infinite;
  }

  .status-done {
    color: #33ff99;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ─── Hisense 廣告圍欄 ─── */
  .ad-board {
    position: absolute;
    bottom: 100px; left: 0; right: 0;
    height: 48px;
    overflow: hidden;
    z-index: 5;
    background: linear-gradient(90deg, #008b8b, #009a8a, #00a88a, #009a8a, #008b8b);
    border-top: 2px solid rgba(0,229,160,0.3);
    border-bottom: 2px solid rgba(0,229,160,0.3);
  }

  .ad-scroll {
    display: flex; align-items: center; height: 100%;
    animation: scrollAd 20s linear infinite;
    white-space: nowrap;
  }

  @keyframes scrollAd {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .ad-item {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0 32px;
    font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 1px;
  }

  /* ─── 守門員剪影 ─── */
  .goalkeeper-silhouette {
    position: absolute;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    opacity: 0.4;
  }

  /* ─── 進度提示 ─── */
  .progress-hint {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    text-align: center;
  }

  .progress-hint .hint-text {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    font-style: italic;
  }

  /* ─── 完成後 Next 按鈕 ─── */
  .next-btn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-family: 'Outfit', sans-serif;
    font-size: 18px; font-weight: 700;
    padding: 14px 50px;
    border: none; border-radius: 50px;
    background: linear-gradient(135deg, #00e5a0, #00b8d4);
    color: #0a1a12;
    cursor: pointer;
    transition: all 0.25s ease;
    display: none;
  }

  .next-btn.show { display: block; }
  .next-btn:hover { transform: translateX(-50%) scale(1.05); }

  /* 旋轉環完成態 */
  .calibration-target.done .calib-ring-outer {
    animation: none;
    border: 2px solid #00e5a0;
  }

  .calibration-target.done .calib-ring-mid {
    animation: none;
    border: 2px solid rgba(0,229,160,0.5);
  }

  .calibration-target.done .calib-pulse {
    animation: none;
    opacity: 0;
  }
</style>
</head>
<body>

<div class="screen">
  <!-- 背景 -->
  <div class="bg-layer">
    <canvas id="bgCanvas"></canvas>
    <div class="bg-darken"></div>
  </div>

  <!-- 頂部標題列 -->
  <div class="step-header">
    <div class="step-header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#00e5a0" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3" fill="#00e5a0"/>
        <line x1="12" y1="2" x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
      </svg>
    </div>
    <div class="step-header-title">Step1. View Calibration</div>
  </div>

  <!-- 說明文字 -->
  <div class="instruction-area">
    <p class="instruction-main">Stand still and look at the dot in front of you.</p>
    <p class="instruction-sub">*If you are not detected, please raise your hand for assistance.</p>
  </div>

  <!-- 守門員剪影 -->
  <div class="goalkeeper-silhouette">
    <svg width="120" height="160" viewBox="0 0 120 160">
      <ellipse cx="60" cy="22" rx="14" ry="16" fill="#336655" opacity="0.5"/>
      <rect x="40" y="38" width="40" height="50" rx="6" fill="#336655" opacity="0.5"/>
      <rect x="30" y="42" width="14" height="35" rx="4" fill="#336655" opacity="0.4"/>
      <rect x="76" y="42" width="14" height="35" rx="4" fill="#336655" opacity="0.4"/>
      <rect x="44" y="88" width="14" height="50" rx="4" fill="#336655" opacity="0.4"/>
      <rect x="62" y="88" width="14" height="50" rx="4" fill="#336655" opacity="0.4"/>
    </svg>
  </div>

  <!-- 校準目標 -->
  <div class="calibration-target" id="calibTarget">
    <div class="calib-crosshair"></div>
    <div class="corner-mark corner-tl"></div>
    <div class="corner-mark corner-tr"></div>
    <div class="corner-mark corner-bl"></div>
    <div class="corner-mark corner-br"></div>
    <div class="calib-pulse"></div>
    <div class="calib-ring-outer"></div>
    <div class="calib-ring-mid"></div>
    <div class="calib-ring-inner"></div>
    <div class="calib-dot" id="calibDot"></div>
    <div class="calib-check" id="calibCheck">
      <svg viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="16" fill="#00e5a0"/>
        <path d="M10 18 L16 24 L26 12" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <!-- 校準狀態 -->
  <div class="status-text status-calibrating" id="statusText">Calibrating... Please wait.</div>

  <!-- 廣告圍欄 -->
  <div class="ad-board">
    <div class="ad-scroll" id="adScroll"></div>
  </div>

  <!-- 完成後 Next 按鈕 -->
  <button class="next-btn" id="nextBtn" onclick="window.location.href='calibration-kick.html'">Next Step</button>

  <!-- 進度提示 -->
  <div class="progress-hint" id="progressHint">
    <span class="hint-text">Step 1 of 2 — Position Check</span>
  </div>
</div>

<script>
// ─── 背景 ───
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

function drawBg() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const w = canvas.width, h = canvas.height;

  // 夜空
  const sky = ctx.createLinearGradient(0, 0, 0, h * 0.5);
  sky.addColorStop(0, '#050a08');
  sky.addColorStop(1, '#0a1a12');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, h * 0.5);

  // 看台
  ctx.fillStyle = '#080e0b';
  ctx.fillRect(0, h * 0.1, w, h * 0.3);

  // 觀眾
  const colors = ['#e24b4a', '#f5c842', '#00b8d4', '#ff6b35', '#fff'];
  for (let i = 0; i < 250; i++) {
    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
    ctx.globalAlpha = 0.15 + Math.random() * 0.3;
    ctx.beginPath();
    ctx.arc(Math.random() * w, h * 0.12 + Math.random() * h * 0.25, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 球門
  const cx = w * 0.5, gt = h * 0.22, gw = w * 0.42, gh = h * 0.25;
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx - gw/2, gt + gh);
  ctx.lineTo(cx - gw/2, gt);
  ctx.lineTo(cx + gw/2, gt);
  ctx.lineTo(cx + gw/2, gt + gh);
  ctx.stroke();

  // 球網
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let c = 0; c <= 20; c++) {
    const x = cx - gw/2 + (gw/20) * c;
    ctx.beginPath(); ctx.moveTo(x, gt); ctx.lineTo(x, gt + gh); ctx.stroke();
  }
  for (let r = 0; r <= 8; r++) {
    const y = gt + (gh/8) * r;
    ctx.beginPath(); ctx.moveTo(cx - gw/2, y); ctx.lineTo(cx + gw/2, y); ctx.stroke();
  }

  // 草地
  const grass = ctx.createLinearGradient(0, h * 0.5, 0, h);
  grass.addColorStop(0, '#16553a');
  grass.addColorStop(0.5, '#1e6b3a');
  grass.addColorStop(1, '#0e3a28');
  ctx.fillStyle = grass;
  ctx.fillRect(0, h * 0.48, w, h * 0.52);

  // 透視草地線
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  for (let i = 0; i < 12; i++) {
    const y = h * 0.5 + i * (h * 0.045);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
}

drawBg();
window.addEventListener('resize', drawBg);

// ─── 廣告 ───
const adScroll = document.getElementById('adScroll');
const fifaSvg = `<svg width="20" height="22" viewBox="0 0 32 36" fill="none" style="opacity:0.8"><path d="M16 2L28 8V20C28 28 16 34 16 34S4 28 4 20V8L16 2Z" fill="#C8A84E"/></svg>`;
let adHTML = '';
for (let i = 0; i < 24; i++) adHTML += `<span class="ad-item">Hisense ${fifaSvg}</span>`;
adScroll.innerHTML = adHTML;

// ─── 校準模擬（3 秒後完成） ───
setTimeout(() => {
  // 完成校準
  document.getElementById('calibTarget').classList.add('done');
  document.getElementById('calibDot').classList.add('done');
  document.getElementById('calibCheck').classList.add('show');
  document.getElementById('calibDot').style.opacity = '0';

  const statusEl = document.getElementById('statusText');
  statusEl.textContent = 'Calibration Complete!';
  statusEl.classList.remove('status-calibrating');
  statusEl.classList.add('status-done');

  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('progressHint').style.display = 'none';
}, 3000);
</script>
</body>
</html>
