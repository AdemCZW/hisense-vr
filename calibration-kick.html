<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Penalty Kick — Kick Calibration</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: #0a0a0a;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    color: #fff;
  }

  .screen {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  /* ─── 背景 ─── */
  .bg-layer { position: absolute; inset: 0; z-index: 0; }
  #bgCanvas { width: 100%; height: 100%; display: block; }
  .bg-darken {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 70% at 50% 45%, rgba(0,0,0,0.2), rgba(0,0,0,0.65));
  }

  /* ─── 頂部步驟標題列 ─── */
  .step-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: linear-gradient(90deg, #005f5f, #008888, #00a5a0, #008888, #005f5f);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 20;
    box-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  .step-header-icon {
    width: 32px; height: 32px;
    background: rgba(0,0,0,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .step-header-title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    font-style: italic;
  }

  /* ─── 說明文字 ─── */
  .instruction-area {
    position: absolute;
    top: 72px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 15;
    width: 90%;
    max-width: 540px;
  }

  .instruction-main {
    font-size: 24px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 12px;
  }

  .instruction-sub {
    font-size: 13px;
    font-weight: 400;
    color: rgba(0, 229, 160, 0.7);
    font-style: italic;
    line-height: 1.6;
  }

  /* ─── 守門員剪影 ─── */
  .goalkeeper-silhouette {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    opacity: 0.35;
  }

  /* ─── 足球 ─── */
  .football-area {
    position: absolute;
    bottom: 12%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .football-wrapper {
    position: relative;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .football-svg {
    width: 100px;
    height: 100px;
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
    transition: all 0.6s ease;
  }

  /* 足球偵測前 - 普通狀態 */
  .football-glow {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,200,66,0.15) 0%, transparent 70%);
    transition: all 0.6s ease;
  }

  /* 偵測成功 - 發光 */
  .football-wrapper.detected .football-glow {
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(245,200,66,0.5) 0%, rgba(245,200,66,0.15) 50%, transparent 70%);
    animation: glow-pulse 1.5s ease-in-out infinite;
  }

  @keyframes glow-pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  /* ─── 雙腳（第一人稱視角） ─── */
  .feet-area {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 8;
    display: flex;
    gap: 60px;
  }

  .foot {
    width: 80px;
    height: 120px;
    position: relative;
  }

  .foot svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4));
  }

  /* ─── Hisense 廣告圍欄 ─── */
  .ad-board {
    position: absolute;
    bottom: 42%;
    left: 0; right: 0;
    height: 48px;
    overflow: hidden;
    z-index: 5;
    background: linear-gradient(90deg, #008b8b, #009a8a, #00a88a, #009a8a, #008b8b);
    border-top: 2px solid rgba(0,229,160,0.3);
    border-bottom: 2px solid rgba(0,229,160,0.3);
  }

  .ad-scroll {
    display: flex; align-items: center; height: 100%;
    animation: scrollAd 20s linear infinite;
    white-space: nowrap;
  }

  @keyframes scrollAd {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .ad-item {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0 32px;
    font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 1px;
  }

  /* ─── 狀態指示 ─── */
  .kick-status {
    position: absolute;
    bottom: 36%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    text-align: center;
    transition: all 0.4s ease;
  }

  .kick-status-text {
    font-size: 18px;
    font-weight: 600;
    font-style: italic;
    color: rgba(255,255,255,0.5);
  }

  .kick-status-text.waiting {
    animation: subtle-blink 2s ease-in-out infinite;
  }

  .kick-status-text.detected {
    color: #00e5a0;
    font-size: 22px;
  }

  @keyframes subtle-blink {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 0.3; }
  }

  /* ─── 踢球動畫提示箭頭 ─── */
  .kick-arrow {
    position: absolute;
    bottom: 25%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    animation: kick-hint 1.5s ease-in-out infinite;
  }

  @keyframes kick-hint {
    0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.6; }
    50% { transform: translateX(-50%) translateY(-15px); opacity: 1; }
  }

  .kick-arrow.hidden { display: none; }

  /* ─── Next 按鈕 ─── */
  .next-btn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-family: 'Outfit', sans-serif;
    font-size: 18px; font-weight: 700;
    padding: 14px 50px;
    border: none; border-radius: 50px;
    background: linear-gradient(135deg, #00e5a0, #00b8d4);
    color: #0a1a12;
    cursor: pointer;
    transition: all 0.25s ease;
    display: none;
    letter-spacing: 1px;
  }

  .next-btn.show { display: block; }
  .next-btn:hover { transform: translateX(-50%) scale(1.05); filter: brightness(1.1); }

  /* ─── 進度提示 ─── */
  .progress-hint {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
  }

  .progress-hint .hint-text {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    font-style: italic;
  }
</style>
</head>
<body>

<div class="screen">
  <!-- 背景 -->
  <div class="bg-layer">
    <canvas id="bgCanvas"></canvas>
    <div class="bg-darken"></div>
  </div>

  <!-- 頂部標題列 -->
  <div class="step-header">
    <div class="step-header-icon">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#00e5a0" stroke-width="2">
        <path d="M12 22c-4-3-8-7-8-12a8 8 0 1116 0c0 5-4 9-8 12z"/>
        <circle cx="12" cy="10" r="3" fill="#00e5a0"/>
      </svg>
    </div>
    <div class="step-header-title">Step2. Kick Calibration</div>
  </div>

  <!-- 說明文字 -->
  <div class="instruction-area">
    <p class="instruction-main">Try a gentle kick</p>
    <p class="instruction-sub">
      *If detected, you're ready to start.<br>
      *If your kicks are not detected, please raise your hand for assistance.
    </p>
  </div>

  <!-- 守門員剪影 -->
  <div class="goalkeeper-silhouette">
    <svg width="100" height="130" viewBox="0 0 120 160">
      <ellipse cx="60" cy="22" rx="14" ry="16" fill="#336655" opacity="0.5"/>
      <rect x="40" y="38" width="40" height="50" rx="6" fill="#336655" opacity="0.5"/>
      <rect x="30" y="42" width="14" height="35" rx="4" fill="#336655" opacity="0.4"/>
      <rect x="76" y="42" width="14" height="35" rx="4" fill="#336655" opacity="0.4"/>
      <rect x="44" y="88" width="14" height="50" rx="4" fill="#336655" opacity="0.4"/>
      <rect x="62" y="88" width="14" height="50" rx="4" fill="#336655" opacity="0.4"/>
    </svg>
  </div>

  <!-- 廣告圍欄 -->
  <div class="ad-board">
    <div class="ad-scroll" id="adScroll"></div>
  </div>

  <!-- 踢球提示箭頭 -->
  <div class="kick-arrow" id="kickArrow">
    <svg width="50" height="40" viewBox="0 0 50 40" fill="none">
      <path d="M25 0 L45 25 L35 25 L35 40 L15 40 L15 25 L5 25 Z" fill="rgba(0,229,160,0.5)" transform="rotate(180 25 20)"/>
    </svg>
  </div>

  <!-- 足球 -->
  <div class="football-area">
    <div class="football-wrapper" id="footballWrapper">
      <div class="football-glow"></div>
      <svg class="football-svg" viewBox="0 0 100 100">
        <!-- 足球主體 -->
        <circle cx="50" cy="50" r="45" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
        <!-- 足球花紋 -->
        <path d="M50 5 L62 20 L50 28 L38 20Z" fill="#2a2a2a" opacity="0.8"/>
        <path d="M95 50 L80 62 L72 50 L80 38Z" fill="#2a2a2a" opacity="0.8"/>
        <path d="M50 95 L38 80 L50 72 L62 80Z" fill="#2a2a2a" opacity="0.8"/>
        <path d="M5 50 L20 38 L28 50 L20 62Z" fill="#2a2a2a" opacity="0.8"/>
        <path d="M50 28 L72 50 L50 72 L28 50Z" fill="#2a2a2a" opacity="0.15"/>
        <!-- 球面高光 -->
        <ellipse cx="38" cy="35" rx="15" ry="12" fill="rgba(255,255,255,0.3)"/>
        <!-- 品牌色條紋 -->
        <path d="M25 70 Q50 60 75 70" fill="none" stroke="#00b8a0" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
        <path d="M30 78 Q50 68 70 78" fill="none" stroke="#f5c842" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      </svg>
    </div>
  </div>

  <!-- 雙腳 (第一人稱視角) -->
  <div class="feet-area">
    <!-- 左腳 -->
    <div class="foot">
      <svg viewBox="0 0 80 120">
        <!-- 小腿 -->
        <rect x="20" y="0" width="36" height="55" rx="12" fill="#f0f0f0"/>
        <!-- 感測器 -->
        <rect x="22" y="20" width="32" height="16" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
        <rect x="30" y="23" width="16" height="10" rx="3" fill="#0a0a1a"/>
        <circle cx="38" cy="28" r="2" fill="#00e5a0" opacity="0.8"/>
        <!-- 球鞋 -->
        <path d="M12 55 Q10 65 8 80 Q6 100 15 110 Q25 118 50 115 Q65 112 68 100 Q70 88 55 55Z" fill="#2dd4a8"/>
        <path d="M15 75 Q35 70 55 75" fill="none" stroke="#1a8a6a" stroke-width="2"/>
        <path d="M15 85 Q35 80 55 85" fill="none" stroke="#1a8a6a" stroke-width="1.5"/>
        <!-- 鞋底 -->
        <path d="M10 105 Q30 115 55 110" fill="none" stroke="#333" stroke-width="3"/>
      </svg>
    </div>
    <!-- 右腳 -->
    <div class="foot">
      <svg viewBox="0 0 80 120" style="transform: scaleX(-1)">
        <rect x="20" y="0" width="36" height="55" rx="12" fill="#f0f0f0"/>
        <rect x="22" y="20" width="32" height="16" rx="5" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
        <rect x="30" y="23" width="16" height="10" rx="3" fill="#0a0a1a"/>
        <circle cx="38" cy="28" r="2" fill="#00e5a0" opacity="0.8"/>
        <path d="M12 55 Q10 65 8 80 Q6 100 15 110 Q25 118 50 115 Q65 112 68 100 Q70 88 55 55Z" fill="#2dd4a8"/>
        <path d="M15 75 Q35 70 55 75" fill="none" stroke="#1a8a6a" stroke-width="2"/>
        <path d="M15 85 Q35 80 55 85" fill="none" stroke="#1a8a6a" stroke-width="1.5"/>
        <path d="M10 105 Q30 115 55 110" fill="none" stroke="#333" stroke-width="3"/>
      </svg>
    </div>
  </div>

  <!-- 狀態文字 -->
  <div class="kick-status" id="kickStatus">
    <span class="kick-status-text waiting" id="kickStatusText">Waiting for kick detection...</span>
  </div>

  <!-- 完成後 Next 按鈕 -->
  <button class="next-btn" id="nextBtn" onclick="window.location.href='vr-penalty-kick.html'">Start Game!</button>

  <!-- 進度 -->
  <div class="progress-hint" id="progressHint">
    <span class="hint-text">Step 2 of 2 — Position Check</span>
  </div>
</div>

<script>
// ─── 背景 ───
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

function drawBg() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const w = canvas.width, h = canvas.height;

  // 夜空
  const sky = ctx.createLinearGradient(0, 0, 0, h * 0.45);
  sky.addColorStop(0, '#050a08');
  sky.addColorStop(1, '#0a1a12');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, h * 0.45);

  // 看台
  ctx.fillStyle = '#080e0b';
  ctx.fillRect(0, h * 0.08, w, h * 0.28);

  // 觀眾
  const colors = ['#e24b4a', '#f5c842', '#00b8d4', '#ff6b35', '#fff'];
  for (let i = 0; i < 200; i++) {
    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
    ctx.globalAlpha = 0.12 + Math.random() * 0.25;
    ctx.beginPath();
    ctx.arc(Math.random() * w, h * 0.1 + Math.random() * h * 0.24, 1.3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 球門（更近，更大）
  const cx = w * 0.5, gt = h * 0.15, gw = w * 0.5, gh = h * 0.28;
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.moveTo(cx - gw/2, gt + gh);
  ctx.lineTo(cx - gw/2, gt);
  ctx.lineTo(cx + gw/2, gt);
  ctx.lineTo(cx + gw/2, gt + gh);
  ctx.stroke();

  // 球網
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let c = 0; c <= 22; c++) {
    const x = cx - gw/2 + (gw/22) * c;
    ctx.beginPath(); ctx.moveTo(x, gt); ctx.lineTo(x, gt + gh); ctx.stroke();
  }
  for (let r = 0; r <= 9; r++) {
    const y = gt + (gh/9) * r;
    ctx.beginPath(); ctx.moveTo(cx - gw/2, y); ctx.lineTo(cx + gw/2, y); ctx.stroke();
  }

  // 草地
  const grass = ctx.createLinearGradient(0, h * 0.45, 0, h);
  grass.addColorStop(0, '#16553a');
  grass.addColorStop(0.4, '#1e6b3a');
  grass.addColorStop(1, '#0e3a28');
  ctx.fillStyle = grass;
  ctx.fillRect(0, h * 0.43, w, h * 0.57);

  // 透視線
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  for (let i = 0; i < 15; i++) {
    const y = h * 0.45 + i * (h * 0.04);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
}

drawBg();
window.addEventListener('resize', drawBg);

// ─── 廣告 ───
const adScroll = document.getElementById('adScroll');
const fifaSvg = `<svg width="20" height="22" viewBox="0 0 32 36" fill="none" style="opacity:0.8"><path d="M16 2L28 8V20C28 28 16 34 16 34S4 28 4 20V8L16 2Z" fill="#C8A84E"/></svg>`;
let adHTML = '';
for (let i = 0; i < 24; i++) adHTML += `<span class="ad-item">Hisense ${fifaSvg}</span>`;
adScroll.innerHTML = adHTML;

// ─── 點擊模擬踢球偵測（實際由 Leg Tracker IMU 觸發） ───
let detected = false;

document.addEventListener('click', () => {
  if (detected) return;
  detected = true;

  // 足球發光
  document.getElementById('footballWrapper').classList.add('detected');

  // 隱藏箭頭
  document.getElementById('kickArrow').classList.add('hidden');

  // 狀態文字
  const statusText = document.getElementById('kickStatusText');
  statusText.textContent = 'Kick Detected! Ready to play.';
  statusText.classList.remove('waiting');
  statusText.classList.add('detected');

  // 顯示 Next 按鈕
  setTimeout(() => {
    document.getElementById('nextBtn').classList.add('show');
    document.getElementById('progressHint').style.display = 'none';
  }, 800);
});

// 自動偵測模擬（4 秒後自動觸發，展場測試用）
setTimeout(() => {
  if (!detected) document.dispatchEvent(new Event('click'));
}, 4000);
</script>
</body>
</html>
